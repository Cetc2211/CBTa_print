<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestor de Impresiones - CBTA 130</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, query, orderBy, limit, deleteDoc, doc, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBbfj61fpxREe0YLXpSX8taSoV06GnLHtw",
            authDomain: "cbta-impresiones.firebaseapp.com",
            projectId: "cbta-impresiones",
            storageBucket: "cbta-impresiones.firebasestorage.app",
            messagingSenderId: "674671663079",
            appId: "1:674671663079:web:709e356d760c2c307f0f42"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        const redesImpresoras = {
            laser_bn: { red: "DIRECT-HP-LaserJet-M15", clave: "12345678" },
            smart_tank: { red: "DIRECT-HP-Smart-Tank-515", clave: "87654321" },
            laser_color: { red: "DIRECT-HP-Color-Laser-Pro", clave: "admin123" }
        };

        let coberturaDetectada = 0;
        let nombreUsuario = localStorage.getItem('nombre_usuario') || "";

        window.onload = () => {
            if (!nombreUsuario) document.getElementById('modal-registro').classList.remove('hidden');
            else document.getElementById('saludo').innerText = `Hola, ${nombreUsuario}`;
            escucharRegistros();
            generarQR();
        };

        // --- ADMINISTRACIÓN DE DATOS ---

        window.borrarRegistro = async (id) => {
            if(confirm("¿Seguro que quieres borrar este registro?")) {
                await deleteDoc(doc(db, "impresiones", id));
            }
        };

        window.iniciarNuevaJornada = async () => {
            if(confirm("¿Deseas borrar TODOS los registros y reiniciar el contador a $0? Esto no se puede deshacer.")) {
                const querySnapshot = await getDocs(collection(db, "impresiones"));
                const batch = writeBatch(db);
                querySnapshot.forEach((d) => batch.delete(d.ref));
                await batch.commit();
            }
        };

        function escucharRegistros() {
            const q = query(collection(db, "impresiones"), orderBy("fecha", "desc"), limit(50));
            onSnapshot(q, (snapshot) => {
                const lista = document.getElementById('historial');
                let totalPesos = 0;
                let totalHojas = 0;
                lista.innerHTML = "";

                snapshot.forEach((doc) => {
                    const d = doc.data();
                    const id = doc.id;
                    totalPesos += d.total || 0;
                    totalHojas += d.paginas || 0;

                    const hora = d.fecha ? new Date(d.fecha.seconds * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "...";
                    
                    lista.innerHTML += `
                        <div class="p-4 border-b border-slate-100 flex justify-between items-center bg-white mb-2 rounded-2xl shadow-sm group">
                            <div class="flex flex-col">
                                <span class="font-bold text-slate-800">${d.usuario}</span>
                                <span class="text-[10px] text-slate-400 uppercase font-bold">${d.impresora} • ${hora}</span>
                            </div>
                            <div class="flex items-center gap-4">
                                <div class="text-right">
                                    <span class="block font-black text-green-600">$${d.total.toFixed(2)}</span>
                                    <span class="text-[10px] text-slate-400">${d.paginas} pág.</span>
                                </div>
                                <button onclick="borrarRegistro('${id}')" class="text-slate-300 hover:text-red-500 transition-colors p-2 text-xl">×</button>
                            </div>
                        </div>`;
                });

                document.getElementById('resumen-dinero').innerText = `$${totalPesos.toFixed(2)}`;
                document.getElementById('resumen-hojas').innerText = totalHojas;
            });
        }

        // --- FUNCIONES DE INTERFAZ (QR, ANALISIS, ETC) ---

        window.generarQR = () => {
            const qrContainer = document.getElementById("qrcode");
            qrContainer.innerHTML = "";
            new QRCode(qrContainer, { text: window.location.href, width: 220, height: 220 });
        };

        window.mostrarQR = () => document.getElementById('modal-qr').classList.remove('hidden');
        window.cerrarQR = () => document.getElementById('modal-qr').classList.add('hidden');
        window.guardarPerfil = () => {
            const n = document.getElementById('input-nombre').value;
            if(n) { localStorage.setItem('nombre_usuario', n); location.reload(); }
        };

        window.analizarArchivo = async (event) => {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            document.getElementById('info-cobertura').innerText = "Analizando color...";
            reader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                document.getElementById('pags-count').value = pdf.numPages;
                const page = await pdf.getPage(1);
                const viewport = page.getViewport({scale: 0.3});
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.height = viewport.height; canvas.width = viewport.width;
                await page.render({canvasContext: context, viewport: viewport}).promise;
                const imgData = context.getImageData(0, 0, canvas.width, canvas.height).data;
                let pixColor = 0;
                for (let i = 0; i < imgData.length; i += 4) {
                    if (Math.abs(imgData[i] - imgData[i+1]) > 15 || Math.abs(imgData[i] - imgData[i+2]) > 15) pixColor++;
                }
                coberturaDetectada = (pixColor / (imgData.length / 4)) * 100;
                window.actualizarPrecios();
            };
            reader.readAsArrayBuffer(file);
        };

        window.actualizarPrecios = () => {
            const pags = parseInt(document.getElementById('pags-count').value) || 0;
            const imp = document.getElementById('impresora').value;
            let pU = 0;
            if (imp === 'laser_bn') pU = 1.0;
            else if (imp === 'smart_tank') pU = coberturaDetectada > 15 ? 3.0 : 1.5;
            else if (imp === 'laser_color') pU = coberturaDetectada > 15 ? 7.0 : 2.5;
            document.getElementById('display-total').innerText = `$${(pags * pU).toFixed(2)}`;
            document.getElementById('info-cobertura').innerText = `Cobertura: ${coberturaDetectada.toFixed(1)}%`;
        };

        window.registrar = async () => {
            const btn = document.getElementById('btn-registrar');
            btn.disabled = true; btn.innerText = "Registrando...";
            const totalStr = document.getElementById('display-total').innerText.replace('$', '');
            const impId = document.getElementById('impresora').value;
            try {
                await addDoc(collection(db, "impresiones"), {
                    usuario: nombreUsuario, impresora: impId, paginas: parseInt(document.getElementById('pags-count').value),
                    total: parseFloat(totalStr), fecha: serverTimestamp()
                });
                const infoRed = redesImpresoras[impId];
                document.getElementById('wifi-nombre').innerText = infoRed.red;
                document.getElementById('wifi-clave').innerText = infoRed.clave;
                document.getElementById('modal-exito').classList.remove('hidden');
            } catch (e) { alert("Error de red"); }
            btn.disabled = false; btn.innerText = "ENVIAR REGISTRO";
        };

        window.cerrarExito = () => document.getElementById('modal-exito').classList.add('hidden');
    </script>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-800 pb-24">

    <div id="modal-qr" class="fixed inset-0 bg-slate-900/95 flex items-center justify-center p-4 z-50 hidden">
        <div class="bg-white p-8 rounded-[2.5rem] w-full max-w-sm text-center">
            <h2 class="text-2xl font-black mb-2">Escanea para Cobro</h2>
            <div id="qrcode" class="flex justify-center my-6 p-4 bg-white rounded-2xl border"></div>
            <button onclick="cerrarQR()" class="w-full bg-slate-100 py-4 rounded-2xl font-bold">Cerrar</button>
        </div>
    </div>

    <div id="modal-registro" class="fixed inset-0 bg-slate-900/90 flex items-center justify-center p-4 z-50 hidden">
        <div class="bg-white p-8 rounded-3xl w-full max-w-sm text-center">
            <h2 class="text-2xl font-black mb-4">¡Bienvenido!</h2>
            <input id="input-nombre" type="text" placeholder="Tu nombre" class="w-full border-2 p-4 rounded-2xl mb-4 text-center font-bold outline-none focus:border-green-500">
            <button onclick="guardarPerfil()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold">Entrar</button>
        </div>
    </div>

    <div id="modal-exito" class="fixed inset-0 bg-green-600/95 flex items-center justify-center p-4 z-50 hidden text-center text-white">
        <div class="max-w-sm w-full">
            <h2 class="text-3xl font-black mb-6">✅ ¡Registrado!</h2>
            <div class="bg-white text-slate-900 p-6 rounded-3xl mb-6 shadow-2xl">
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-2">Conéctate a:</p>
                <p id="wifi-nombre" class="text-lg font-black mb-3 text-slate-700"></p>
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-2">Contraseña:</p>
                <p id="wifi-clave" class="text-2xl font-black text-green-600 tracking-widest"></p>
            </div>
            <button onclick="cerrarExito()" class="w-full bg-white/20 border-2 border-white py-4 rounded-2xl font-bold">Cerrar</button>
        </div>
    </div>

    <div class="max-w-6xl mx-auto p-4 lg:p-10">
        <header class="flex justify-between items-center mb-8">
            <h1 id="saludo" class="text-2xl font-black">Cargando...</h1>
            <button onclick="iniciarNuevaJornada()" class="text-xs font-bold text-red-500 bg-red-50 px-4 py-2 rounded-full border border-red-100 hover:bg-red-500 hover:text-white transition">NUEVA JORNADA</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-5 bg-white p-8 rounded-[2rem] shadow-xl border border-slate-100 space-y-6 self-start">
                <label class="block">
                    <span class="text-xs font-black uppercase text-slate-400 mb-2 block tracking-widest">1. Cargar Documento</span>
                    <input type="file" accept=".pdf" onchange="analizarArchivo(event)" class="w-full text-sm file:mr-4 file:py-3 file:px-6 file:rounded-2xl file:border-0 file:bg-slate-900 file:text-white">
                </label>

                <div class="grid grid-cols-2 gap-4">
                    <input id="pags-count" type="number" value="1" oninput="actualizarPrecios()" class="bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 text-xl font-bold outline-none focus:border-green-500">
                    <select id="impresora" onchange="actualizarPrecios()" class="bg-slate-50 border-2 border-slate-100 rounded-2xl p-4 font-bold outline-none focus:border-green-500">
                        <option value="laser_bn">Laser B/N</option>
                        <option value="smart_tank">Smart Tank</option>
                        <option value="laser_color">Laser Pro</option>
                    </select>
                </div>

                <div class="bg-slate-900 rounded-[2rem] p-8 text-center text-white shadow-2xl">
                    <p id="info-cobertura" class="text-green-400 text-[10px] font-black uppercase tracking-widest mb-2">Esperando...</p>
                    <div id="display-total" class="text-6xl font-black tracking-tighter">$0.00</div>
                </div>

                <button id="btn-registrar" onclick="registrar()" class="w-full bg-green-500 text-white font-black py-6 rounded-[1.5rem] text-xl shadow-lg hover:bg-green-600 transition">ENVIAR REGISTRO</button>
            </div>

            <div class="lg:col-span-7 space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-white p-6 rounded-[2rem] shadow-md border border-slate-100 text-center">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Ingresos Totales</p>
                        <p id="resumen-dinero" class="text-3xl font-black text-green-600">$0.00</p>
                    </div>
                    <div class="bg-white p-6 rounded-[2rem] shadow-md border border-slate-100 text-center">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Hojas Impresas</p>
                        <p id="resumen-hojas" class="text-3xl font-black text-slate-800">0</p>
                    </div>
                </div>

                <div class="bg-slate-100/50 p-6 rounded-[2.5rem] border-2 border-dashed border-slate-200">
                    <h2 class="font-black text-slate-400 uppercase text-[10px] mb-6 tracking-[0.2em] text-center">Historial en Tiempo Real</h2>
                    <div id="historial" class="space-y-2 h-[400px] overflow-y-auto pr-2">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <button onclick="mostrarQR()" class="fixed bottom-6 right-6 bg-slate-900 text-white p-5 rounded-full shadow-2xl z-40 hover:scale-105 active:scale-95 transition-all flex items-center gap-3">
        <span class="text-2xl">📲</span>
        <span class="font-bold pr-2">Mostrar QR Alumno</span>
    </button>

</body>
</html>
