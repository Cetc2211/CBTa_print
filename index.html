<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POS Pro - CBTa 130</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        .custom-scroll { -webkit-overflow-scrolling: touch; }
        input, select, textarea { font-size: 16px !important; }
        .table-container { overflow-x: auto; white-space: nowrap; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin-once { animation: spin 0.6s linear; }
    </style>
</head>
<body class="bg-slate-100 p-2 font-sans overflow-x-hidden custom-scroll text-slate-800">

    <!-- Botón QR para Alumnos (Acceso rápido) -->
    <button id="btn-flotante-qr" class="fixed bottom-6 right-6 bg-slate-900 text-white p-5 rounded-full shadow-2xl z-40 hidden active:scale-95 transition-all">📲 QR</button>

    <!-- PANEL ADMINISTRADOR (PROFR. CECILIO) -->
    <div id="panel-admin" class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-4 hidden">
        
        <!-- Columna Izquierda: Carrito de Cobro -->
        <div class="lg:col-span-4 lg:h-[650px] lg:sticky lg:top-2 flex flex-col bg-white p-4 lg:p-6 rounded-[2.5rem] shadow-xl border-4 border-indigo-600 order-1">
            <h2 class="text-center font-black uppercase text-[10px] text-slate-400 mb-4 tracking-widest">Cuenta Actual</h2>
            <div id="items-carrito" class="flex-1 min-h-[120px] max-h-[300px] lg:max-h-none overflow-y-auto mb-4 border-t border-b py-2 text-[11px]">
                <!-- Aquí caen productos e impresiones -->
            </div>
            <div class="text-center">
                <p id="total-carrito" class="text-4xl lg:text-5xl font-black text-slate-900 mb-4">$0.00</p>
                <button id="btn-finalizar" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black shadow-xl active:bg-indigo-700 uppercase transition-all">Finalizar y Cobrar</button>
            </div>
        </div>

        <!-- Columna Derecha: Gestión -->
        <div class="lg:col-span-8 space-y-4 order-2">
            <header class="flex flex-col sm:flex-row justify-between items-center bg-white p-4 rounded-3xl shadow-sm gap-4">
                <div class="flex flex-col items-center sm:items-start text-center sm:text-left">
                    <h1 id="saludo" class="font-black uppercase text-xs text-slate-500 tracking-tighter">Panel Administrativo</h1>
                    <button onclick="window.cerrarSesion()" class="text-[9px] text-red-500 font-bold uppercase underline">Cerrar Sesión</button>
                </div>
                <div class="flex gap-2 w-full sm:w-auto justify-center">
                    <button id="btn-abrir-scanner" class="flex-1 bg-green-600 text-white px-4 py-3 rounded-xl font-bold text-[10px]">📸 ESCANEAR</button>
                    <button id="btn-abrir-db" class="flex-1 bg-slate-900 text-white px-4 py-3 rounded-xl font-bold text-[10px]">📦 STOCK</button>
                    <button id="btn-abrir-finanzas" class="flex-1 bg-amber-500 text-white px-4 py-3 rounded-xl font-bold text-[10px]">📊 FINANZAS</button>
                </div>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Cola de Impresión -->
                <div class="bg-white p-5 rounded-[2rem] border h-[480px] flex flex-col shadow-sm">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="font-black text-[10px] text-slate-400 uppercase tracking-widest">Impresiones Pendientes</h3>
                        <button id="btn-refrescar-cola" class="bg-slate-100 p-2 rounded-full text-indigo-600 active:scale-90">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                        </button>
                    </div>
                    <div id="lista-impresiones" class="flex-1 overflow-y-auto space-y-2 custom-scroll"></div>
                </div>

                <!-- Lista rápida de Stock -->
                <div class="bg-white p-5 rounded-[2rem] border h-[480px] flex flex-col shadow-sm">
                    <h3 class="text-center font-black text-[10px] text-slate-400 uppercase mb-4 tracking-widest">Papelería y Dulces</h3>
                    <div class="relative mb-4">
                        <input type="text" id="busqueda-producto" placeholder="Buscar artículo..." class="w-full bg-slate-100 border-none rounded-2xl p-3 pl-10 text-xs font-bold outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                        <div class="absolute left-3 top-3 text-slate-400"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg></div>
                    </div>
                    <div id="lista-stock-rapido" class="flex-1 overflow-y-auto space-y-1 custom-scroll"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- PANEL ALUMNO -->
    <div id="panel-alumno" class="max-w-md mx-auto space-y-4 hidden pt-4 px-2">
        <button onclick="window.cerrarSesion()" class="w-full text-center text-[10px] text-slate-400 font-bold uppercase mb-2">← Salir / Cambiar Usuario</button>
        <div class="bg-white p-6 rounded-[2.5rem] shadow-2xl border-t-8 border-indigo-600 space-y-6">
            <h3 class="text-center font-black uppercase text-[10px] text-slate-400 tracking-widest">Subir Trabajo para Imprimir</h3>
            
            <div class="space-y-2">
                <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Selecciona tu archivo (PDF)</label>
                <input type="file" id="input-archivo" accept=".pdf" class="w-full text-xs file:bg-slate-900 file:text-white file:rounded-xl file:border-0 file:p-3 file:mr-4 file:font-bold">
            </div>

            <div class="grid grid-cols-2 gap-2">
                <div class="text-center bg-slate-50 p-2 rounded-2xl border">
                    <span class="text-[8px] font-bold text-slate-400 block uppercase">Páginas detectadas</span>
                    <input id="alumno-pags" type="number" readonly value="0" class="w-full bg-transparent font-black text-center text-xl outline-none">
                </div>
                <div class="flex flex-col">
                    <span class="text-[8px] font-bold text-slate-400 block uppercase mb-1 ml-2">Tipo de Impresión</span>
                    <select id="alumno-imp" class="bg-slate-50 border rounded-2xl p-3 font-black text-xs uppercase outline-none">
                        <option value="laser_bn">Láser B/N ($0.50)</option>
                        <option value="smart_tank">Color ($2.00)</option>
                    </select>
                </div>
            </div>

            <div class="bg-slate-900 rounded-[2rem] p-6 text-center shadow-xl">
                <p id="info-status" class="text-green-400 text-[9px] font-black uppercase mb-1 tracking-widest">Costo Estimado</p>
                <div id="alumno-total" class="text-4xl font-black text-white">$0.00</div>
            </div>

            <button id="btn-enviar-archivo" class="w-full bg-indigo-600 text-white font-black py-5 rounded-3xl text-lg uppercase shadow-lg transition-all active:scale-95">Enviar al Profr. Cecilio</button>
        </div>
    </div>

    <!-- Modales (Finanzas, Inventario, Éxito) - Se mantienen según tu diseño original -->
    <!-- ... (El resto de modales que ya tenías en tu index.html) ... -->

    <script type="module" src="js/app.js?v=2026.final"></script>
</body>
</html>
