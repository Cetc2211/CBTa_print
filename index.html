<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POS Pro - CBTa 130</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        /* Ajuste para que el scroll sea suave en iOS */
        .custom-scroll { -webkit-overflow-scrolling: touch; }
        /* Evitar que el zoom automático en iPhone rompa el diseño */
        input, select, textarea { font-size: 16px !important; }
    </style>
</head>
<body class="bg-slate-100 p-2 font-sans overflow-x-hidden custom-scroll">

    <button id="btn-flotante-qr" class="fixed bottom-6 right-6 bg-slate-900 text-white p-5 rounded-full shadow-2xl z-40 hidden active:scale-95 transition-all">📲 QR</button>

    <div id="panel-admin" class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-4 hidden">
        
        <div class="lg:col-span-4 lg:h-[600px] lg:sticky lg:top-2 flex flex-col bg-white p-4 lg:p-6 rounded-[2rem] lg:rounded-[2.5rem] shadow-xl border-4 border-indigo-600 order-1 lg:order-1">
            <h2 class="text-center font-black uppercase text-[10px] text-slate-400 mb-2 lg:mb-4 tracking-widest">Cuenta Actual</h2>
            <div id="items-carrito" class="flex-1 min-h-[100px] max-h-[300px] lg:max-h-none overflow-y-auto mb-4 border-t border-b py-2 text-[11px]"></div>
            <div class="text-center">
                <p id="total-carrito" class="text-4xl lg:text-5xl font-black text-slate-900 mb-2 lg:mb-4">$0.00</p>
                <button id="btn-finalizar" class="w-full bg-indigo-600 text-white py-4 lg:py-5 rounded-2xl font-black shadow-xl active:bg-indigo-700">FINALIZAR Y COBRAR</button>
            </div>
        </div>

        <div class="lg:col-span-8 space-y-4 order-2 lg:order-2">
            <header class="flex flex-col sm:flex-row justify-between items-center bg-white p-4 rounded-3xl shadow-sm gap-4">
                <h1 id="saludo" class="font-black uppercase text-xs text-slate-500 tracking-tighter"></h1>
                <div class="flex gap-2 w-full sm:w-auto justify-center">
                    <button id="btn-abrir-scanner" class="flex-1 sm:flex-none bg-green-600 text-white px-4 py-3 rounded-xl font-bold text-[10px]">📸 ESCANEAR</button>
                    <button id="btn-abrir-db" class="flex-1 sm:flex-none bg-slate-900 text-white px-4 py-3 rounded-xl font-bold text-[10px]">📦 STOCK</button>
                    <button id="btn-abrir-finanzas" class="flex-1 sm:flex-none bg-amber-500 text-white px-4 py-3 rounded-xl font-bold text-[10px]">📊 FINANZAS</button>
                </div>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="bg-white p-5 rounded-[2rem] border h-[450px] lg:h-[480px] flex flex-col shadow-sm">
                    <h3 class="text-center font-black text-[10px] text-slate-400 uppercase mb-4 tracking-widest uppercase">Impresiones</h3>
                    <div id="lista-impresiones" class="flex-1 overflow-y-auto space-y-2"></div>
                </div>
                <div class="bg-white p-5 rounded-[2rem] border h-[450px] lg:h-[480px] flex flex-col shadow-sm">
                    <h3 class="text-center font-black text-[10px] text-slate-400 uppercase mb-4 tracking-widest uppercase">Papelería</h3>
                    <div id="lista-stock-rapido" class="flex-1 overflow-y-auto space-y-1"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="panel-alumno" class="max-w-md mx-auto space-y-4 hidden pt-4 lg:pt-10 px-2 lg:px-4">
        <div class="bg-white p-6 lg:p-8 rounded-[2.5rem] shadow-2xl border-t-8 border-indigo-600 space-y-6">
            <h3 class="text-center font-black uppercase text-[10px] text-slate-400 tracking-widest uppercase">Subir Trabajo</h3>
            <input type="file" id="input-archivo" accept=".pdf, image/*" class="w-full text-xs file:bg-slate-900 file:text-white file:rounded-xl file:border-0 file:p-3">
            <div class="grid grid-cols-2 gap-2">
                <div class="text-center bg-slate-50 p-2 rounded-2xl border">
                    <span class="text-[8px] font-bold text-slate-400 block uppercase">Páginas</span>
                    <input id="alumno-pags" type="number" readonly value="0" class="w-full bg-transparent font-black text-center text-xl outline-none">
                </div>
                <select id="alumno-imp" class="bg-slate-50 border rounded-2xl p-3 font-black text-xs uppercase outline-none">
                    <option value="laser_bn">Láser B/N ($0.50)</option>
                    <option value="smart_tank">Color (Saturación)</option>
                </select>
            </div>
            <div class="bg-slate-900 rounded-[2rem] p-6 lg:p-8 text-center shadow-xl">
                <p id="info-status" class="text-green-400 text-[9px] font-black uppercase mb-1 tracking-widest">Listo</p>
                <div id="alumno-total" class="text-4xl lg:text-5xl font-black text-white">$0.00</div>
            </div>
            <button id="btn-enviar-archivo" class="w-full bg-indigo-600 text-white font-black py-5 rounded-3xl text-lg shadow-lg active:scale-95 transition-all uppercase">Enviar al Profr. Cecilio</button>
        </div>
    </div>

    <div id="modal-finanzas" class="fixed inset-0 bg-slate-900/95 z-[110] hidden flex items-center justify-center p-2 lg:p-6">
        <div class="bg-white w-full max-w-6xl max-h-full lg:max-h-[95vh] rounded-[2rem] lg:rounded-[2.5rem] flex flex-col p-4 lg:p-8 overflow-hidden">
            <div class="flex justify-between items-center mb-4 lg:mb-6">
                <h2 class="font-black text-lg lg:text-2xl uppercase tracking-tighter">Balance Financiero</h2>
                <button id="btn-cerrar-finanzas" class="text-red-500 border-2 border-red-500 px-4 py-1 rounded-full text-[10px] font-black uppercase">Cerrar</button>
            </div>
            <div class="grid grid-cols-3 gap-2 lg:gap-4 mb-4 lg:mb-6">
                <div class="bg-blue-50 p-2 lg:p-4 rounded-2xl border border-blue-100 text-center lg:text-left">
                    <span class="text-[7px] lg:text-[9px] font-black text-blue-400 uppercase">Inversión</span>
                    <p id="fin-inversion-total" class="text-xs lg:text-2xl font-black text-blue-900">$0.00</p>
                </div>
                <div class="bg-green-50 p-2 lg:p-4 rounded-2xl border border-green-100 text-center lg:text-left">
                    <span class="text-[7px] lg:text-[9px] font-black text-green-400 uppercase">Ingresos</span>
                    <p id="fin-ingresos-totales" class="text-xs lg:text-2xl font-black text-green-900">$0.00</p>
                </div>
                <div class="bg-indigo-50 p-2 lg:p-4 rounded-2xl border border-indigo-100 text-center lg:text-left">
                    <span class="text-[7px] lg:text-[9px] font-black text-indigo-400 uppercase">Utilidad</span>
                    <p id="fin-utilidad-total" class="text-xs lg:text-2xl font-black text-indigo-900">$0.00</p>
                </div>
            </div>
            <div class="overflow-x-auto flex-1 rounded-2xl border bg-white">
                <table class="w-full text-[9px] lg:text-[10px] min-w-[600px]">
                    <thead class="bg-slate-200 uppercase sticky top-0 font-black">
                        <tr class="text-left">
                            <th class="p-3">Producto</th>
                            <th class="p-3 text-center">Inversión</th>
                            <th class="p-3 text-center">Ventas</th>
                            <th class="p-3 text-center">Estatus</th>
                            <th class="p-3 text-right">Ganancia</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-finanzas-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module" src="./js/app.js?v=2026.mobile.v1"></script>
</body>
</html>
