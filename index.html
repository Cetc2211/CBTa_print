<script type="module">
    // ... (imports y firebaseConfig igual que el anterior) ...

    function escucharRegistros() {
        // Forzamos la escucha a la colección exacta 'registros_impresion'
        const q = query(collection(db, "registros_impresion"), orderBy("fecha", "desc"), limit(25));
        
        onSnapshot(q, (snapshot) => {
            const lista = document.getElementById('historial');
            const totalDisplay = document.getElementById('resumen-dinero');
            
            if (!lista) return; // Seguridad por si el elemento no carga
            
            let total$ = 0; 
            lista.innerHTML = ""; // Limpiamos la lista para actualizar

            if (snapshot.empty) {
                lista.innerHTML = "<p class='text-center text-slate-400 text-xs mt-10'>No hay archivos pendientes</p>";
                totalDisplay.innerText = "$0.00";
                return;
            }

            snapshot.forEach((docSnap) => {
                const d = docSnap.data(); 
                total$ += d.total || 0;
                const hora = d.fecha ? new Date(d.fecha.seconds * 1000).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : "Reciente";
                
                // Creamos el diseño del registro que aparecerá en tu iPad
                lista.innerHTML += `
                    <div class="p-4 border-b flex justify-between items-center bg-white mb-2 rounded-2xl shadow-sm border border-slate-50">
                        <div class="text-xs">
                            <b class="text-slate-900 text-sm uppercase">${d.usuario}</b><br>
                            <span class="text-slate-400 text-[10px] block truncate max-w-[150px]">${d.archivo}</span>
                            <span class="text-indigo-400 font-bold text-[9px] uppercase">${d.impresora || 'Láser'} • ${hora}</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <a href="${d.archivoURL}" target="_blank" class="bg-indigo-600 text-white px-4 py-2 rounded-xl text-[10px] font-black shadow-md active:scale-95 transition-all">ABRIR</a>
                            <span class="font-black text-green-600 text-sm ml-1">$${(d.total || 0).toFixed(2)}</span>
                            <button onclick="window.borrarRegistro('${docSnap.id}')" class="text-red-100 hover:text-red-500 ml-1 font-bold text-lg">×</button>
                        </div>
                    </div>`;
            });
            totalDisplay.innerText = `$${total$.toFixed(2)}`;
        });
    }

    // Asegúrate de que esta función de borrado esté disponible
    window.borrarRegistro = async (id) => { 
        if(confirm("¿Ya imprimiste este archivo? Se eliminará de la lista.")) {
            await deleteDoc(doc(db, "registros_impresion", id)); 
        }
    };
</script>
