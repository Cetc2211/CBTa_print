<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POS Pro - CBTa 130</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-slate-100 p-2 font-sans overflow-x-hidden">

    <button id="btn-flotante-qr" class="fixed bottom-6 right-6 bg-slate-900 text-white p-5 rounded-full shadow-2xl z-40 hidden active:scale-95 transition-all">📲 QR</button>

    <div id="panel-admin" class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-4 hidden">
        <div class="lg:col-span-4 h-[600px] sticky top-2 flex flex-col bg-white p-6 rounded-[2.5rem] shadow-2xl border-4 border-indigo-600">
            <h2 class="text-center font-black uppercase text-[10px] text-slate-400 mb-4 tracking-widest">Cuenta Actual</h2>
            <div id="items-carrito" class="flex-1 overflow-y-auto mb-4 border-t border-b py-2"></div>
            <div class="text-center">
                <p id="total-carrito" class="text-5xl font-black text-slate-900 mb-4">$0.00</p>
                <button id="btn-finalizar" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black shadow-xl disabled:opacity-50">FINALIZAR Y COBRAR</button>
            </div>
        </div>
        <div class="lg:col-span-8 space-y-4">
            <header class="flex justify-between items-center bg-white p-4 rounded-3xl shadow-sm">
                <h1 id="saludo" class="font-black uppercase text-xs text-slate-500 tracking-tighter"></h1>
                <div class="flex gap-2">
                    <button id="btn-abrir-scanner" class="bg-green-600 text-white px-4 py-2 rounded-xl font-bold text-[10px]">📸 ESCANEAR</button>
                    <button id="btn-abrir-db" class="bg-slate-900 text-white px-4 py-2 rounded-xl font-bold text-[10px]">📦 BASE DE DATOS</button>
                </div>
            </header>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
                <div class="bg-white p-5 rounded-[2rem] border h-[480px] flex flex-col shadow-sm">
                    <h3 class="text-center font-black text-[10px] text-slate-400 uppercase mb-4 tracking-widest">Impresiones Recibidas</h3>
                    <div id="lista-impresiones" class="flex-1 overflow-y-auto space-y-2"></div>
                </div>
                <div class="bg-white p-5 rounded-[2rem] border h-[480px] flex flex-col shadow-sm">
                    <h3 class="text-center font-black text-[10px] text-slate-400 uppercase mb-4 tracking-widest">Papelería Stock</h3>
                    <div id="lista-stock-rapido" class="flex-1 overflow-y-auto space-y-1"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="panel-alumno" class="max-w-md mx-auto space-y-4 hidden pt-10 px-4">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl border-t-8 border-indigo-600 space-y-6">
            <h3 class="text-center font-black uppercase text-[10px] text-slate-400 tracking-widest">Subir Trabajo</h3>
            <input type="file" id="input-archivo" accept=".pdf, image/*" class="w-full text-xs file:bg-slate-900 file:text-white file:rounded-xl file:border-0 file:p-3 file:font-bold">
            <div class="grid grid-cols-2 gap-2">
                <div class="text-center bg-slate-50 p-2 rounded-2xl border">
                    <span class="text-[8px] font-bold text-slate-400 block uppercase">Páginas</span>
                    <input id="alumno-pags" type="number" readonly value="0" class="w-full bg-transparent font-black text-center text-xl outline-none">
                </div>
                <select id="alumno-imp" class="bg-slate-50 border rounded-2xl p-3 font-black text-xs uppercase outline-none">
                    <option value="laser_bn">Láser B/N ($0.50)</option>
                    <option value="smart_tank">Color (Saturación)</option>
                </select>
            </div>
            <div class="bg-slate-900 rounded-[2rem] p-8 text-center shadow-xl">
                <p id="info-status" class="text-green-400 text-[9px] font-black uppercase mb-1 tracking-widest uppercase">Esperando archivo</p>
                <div id="alumno-total" class="text-5xl font-black text-white">$0.00</div>
            </div>
            <button id="btn-enviar-archivo" class="w-full bg-indigo-600 text-white font-black py-5 rounded-3xl text-lg shadow-lg active:scale-95 transition-all">ENVIAR AL PROFESOR</button>
        </div>
    </div>

    <div id="modal-db" class="fixed inset-0 bg-slate-900/95 z-[100] hidden flex items-center justify-center p-2">
        <div class="bg-white w-full max-w-5xl max-h-[90vh] rounded-[2rem] flex flex-col p-8 overflow-hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-black text-2xl uppercase tracking-tighter">Inventario y Stock</h2>
                <button id="btn-cerrar-db" class="text-red-500 border-2 border-red-500 px-4 py-1 rounded-full text-xs font-bold uppercase">Cerrar</button>
            </div>
            <form id="form-db" class="grid grid-cols-2 lg:grid-cols-4 gap-2 mb-4 bg-slate-50 p-4 rounded-3xl border">
                <input id="db-nombre" placeholder="Producto" class="p-3 border rounded-xl uppercase text-[10px] font-bold" required>
                <input id="db-stock" type="number" placeholder="Stock" class="p-3 border rounded-xl text-[10px]" required>
                <input id="db-costo" type="number" step="0.01" placeholder="Costo Compra" class="p-3 border rounded-xl text-[10px]" required>
                <input id="db-venta" type="number" step="0.01" placeholder="Venta Público" class="p-3 border rounded-xl text-[10px]" required>
                <button type="submit" class="col-span-2 lg:col-span-4 bg-indigo-600 text-white py-3 rounded-2xl font-black uppercase text-[10px]">Registrar</button>
            </form>
            <div class="overflow-y-auto flex-1"><table class="w-full text-left text-[10px]"><thead class="bg-slate-100 uppercase sticky top-0"><tr><th class="p-3">Nombre</th><th class="p-3 text-center">Stock</th><th class="p-3 text-center">Costo</th><th class="p-3 text-center">Venta</th><th class="p-3"></th></tr></thead><tbody id="tabla-db-body"></tbody></table></div>
        </div>
    </div>

    <div id="modal-etiqueta" class="fixed inset-0 bg-black/80 z-[200] hidden flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-[2rem] text-center max-w-xs w-full shadow-2xl">
            <div id="etiqueta-print" class="p-4 border-2 border-dashed border-slate-300 rounded-xl mb-4 bg-white">
                <h4 id="etiqueta-nombre" class="font-black uppercase text-sm mb-2 truncate text-slate-900">PRODUCTO</h4>
                <div id="etiqueta-qr" class="flex justify-center mb-2"></div>
                <p id="etiqueta-precio" class="font-bold text-lg text-indigo-600">$0.00</p>
                <p class="text-[7px] text-slate-400 mt-1 uppercase tracking-widest">CBTa 130 - Gestión de Inventario</p>
            </div>
            <button id="btn-cerrar-etiqueta" class="w-full bg-slate-100 py-3 rounded-xl font-black uppercase text-xs">Cerrar</button>
        </div>
    </div>

    <div id="modal-scanner" class="fixed inset-0 bg-black z-[100] hidden flex flex-col"><div id="reader" class="w-full h-full"></div><button id="btn-cerrar-scanner" class="absolute bottom-10 left-1/2 -translate-x-1/2 bg-red-600 text-white px-10 py-4 rounded-2xl font-black">CERRAR</button></div>
    <div id="modal-qr" class="fixed inset-0 bg-slate-900/95 z-50 hidden flex items-center justify-center p-4"><div class="bg-white p-8 rounded-[2.5rem] text-center"><h2 class="text-2xl font-black mb-4 uppercase">Escanear para Pedir</h2><div id="qrcode" class="flex justify-center mb-6"></div><button id="btn-cerrar-qr" class="w-full bg-slate-100 py-4 rounded-2xl font-bold uppercase">Cerrar</button></div></div>
    <div id="modal-registro" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-[200] hidden"><div class="bg-white p-10 rounded-[2.5rem] w-full max-w-sm text-center"><h2 class="text-3xl font-black uppercase mb-8">Acceso CBTa 130</h2><input id="input-nombre" placeholder="TU NOMBRE" class="w-full border-4 p-4 rounded-3xl mb-4 text-center font-black uppercase outline-none"><button id="btn-entrar" class="w-full bg-slate-900 text-white py-5 rounded-3xl font-black">ENTRAR</button></div></div>
    <div id="modal-exito" class="fixed inset-0 bg-green-600 flex items-center justify-center p-4 z-[200] hidden text-center"><div class="max-w-sm w-full"><h2 class="text-4xl font-black text-white uppercase mb-4">✅ ENVIADO</h2><button onclick="location.reload()" class="w-full border-4 border-white py-4 rounded-3xl font-black text-white uppercase">Aceptar</button></div></div>

    <script type="module" src="./js/app.js?v=2026.1"></script>
</body>
</html>
