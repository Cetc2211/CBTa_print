<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Punto de Venta Integral - CBTa 130</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, query, orderBy, limit, deleteDoc, doc, updateDoc, increment, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCDy-W8_3sB3WS8gVKZuzV_P6PdG1tBOUc",
            authDomain: "academic-tracker-qeoxi.firebaseapp.com",
            projectId: "academic-tracker-qeoxi",
            storageBucket: "academic-tracker-qeoxi.firebasestorage.app",
            messagingSenderId: "674671663079",
            appId: "1:674671663079:web:96e8125d02652b024469e3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);
        
        let carrito = [];
        let html5QrCode = null;

        window.onload = () => {
            const nombreUsuario = localStorage.getItem('nombre_usuario') || "";
            if (!nombreUsuario) {
                document.getElementById('modal-registro').classList.remove('hidden');
            } else {
                document.getElementById('saludo').innerText = `Hola, ${nombreUsuario}`;
                const esAdmin = nombreUsuario.toLowerCase().includes("cecilio") || nombreUsuario.toLowerCase().includes("danika landeros");
                if (esAdmin) {
                    document.getElementById('panel-admin').classList.remove('hidden');
                    escucharImpresiones();
                    escucharInventario();
                }
            }
        };

        // --- LÓGICA DEL CARRITO (VENTA TEMPORAL) ---
        window.agregarAlCarrito = (id, nombre, precio, tipo = 'producto') => {
            carrito.push({ id, nombre, precio, tipo });
            renderizarCarrito();
        };

        window.quitarDelCarrito = (index) => {
            carrito.splice(index, 1);
            renderizarCarrito();
        };

        function renderizarCarrito() {
            const cont = document.getElementById('items-carrito');
            const totalCont = document.getElementById('total-carrito');
            cont.innerHTML = "";
            let total = 0;
            
            carrito.forEach((item, index) => {
                total += item.precio;
                cont.innerHTML += `
                    <div class="flex justify-between items-center bg-slate-50 p-2 rounded-lg mb-1 text-[11px]">
                        <span class="truncate w-32 font-bold">${item.nombre}</span>
                        <div class="flex items-center gap-2">
                            <span>$${item.precio.toFixed(2)}</span>
                            <button onclick="window.quitarDelCarrito(${index})" class="text-red-500 font-bold">×</button>
                        </div>
                    </div>`;
            });
            totalCont.innerText = `$${total.toFixed(2)}`;
            document.getElementById('btn-finalizar').disabled = carrito.length === 0;
        }

        window.finalizarVenta = async () => {
            if(!confirm("¿Confirmar cobro y finalizar venta?")) return;
            
            const btn = document.getElementById('btn-finalizar');
            btn.disabled = true;
            btn.innerText = "PROCESANDO...";

            try {
                for (const item of carrito) {
                    if (item.tipo === 'producto') {
                        const docRef = doc(db, "inventario", item.id);
                        await updateDoc(docRef, {
                            stock: increment(-1),
                            ventasDia: increment(1),
                            totalDia: increment(item.precio)
                        });
                    } else if (item.tipo === 'impresion') {
                        // Opcional: Podrías marcar la impresión como "cobrada" en Firestore
                        await deleteDoc(doc(db, "cola_impresion", item.id));
                    }
                }
                
                // Guardar registro histórico de la venta total (Opcional)
                await addDoc(collection(db, "historial_ventas"), {
                    items: carrito,
                    total: parseFloat(document.getElementById('total-carrito').innerText.replace('$','')),
                    fecha: serverTimestamp()
                });

                alert("Venta completada con éxito");
                carrito = [];
                renderizarCarrito();
            } catch (e) {
                alert("Error al finalizar venta");
            }
            btn.disabled = false;
            btn.innerText = "FINALIZAR Y COBRAR";
        };

        // --- ESCÁNER ---
        window.abrirEscaner = () => {
            document.getElementById('modal-escaner').classList.remove('hidden');
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, async (text) => {
                const docRef = doc(db, "inventario", text);
                const snap = await getDoc(docRef);
                if(snap.exists()){
                    window.agregarAlCarrito(text, snap.data().nombre, snap.data().venta);
                    window.cerrarEscaner();
                }
            });
        };

        window.cerrarEscaner = () => {
            if(html5QrCode) html5QrCode.stop().then(() => document.getElementById('modal-escaner').classList.add('hidden'));
        };

        // --- ESCUCHA DE DATOS ---
        function escucharImpresiones() {
            onSnapshot(query(collection(db, "cola_impresion"), orderBy("fecha", "desc")), (snap) => {
                const cont = document.getElementById('lista-impresiones');
                cont.innerHTML = "";
                snap.forEach(docSnap => {
                    const d = docSnap.data();
                    cont.innerHTML += `
                        <div class="p-3 bg-white border-b flex justify-between items-center rounded-xl mb-1">
                            <div class="text-[10px]"><b>${d.usuario}</b><br>${d.archivo}</div>
                            <div class="flex items-center gap-2">
                                <a href="${d.archivoURL}" target="_blank" class="text-indigo-600 font-bold text-[10px]">VER</a>
                                <button onclick="window.agregarAlCarrito('${docSnap.id}', 'Imp: ${d.usuario}', ${d.total}, 'impresion')" class="bg-green-100 text-green-700 px-3 py-1 rounded-lg font-black text-[10px]">+ COBRAR</button>
                            </div>
                        </div>`;
                });
            });
        }

        function escucharInventario() {
            onSnapshot(collection(db, "inventario"), (snap) => {
                const cont = document.getElementById('lista-stock');
                cont.innerHTML = "";
                snap.forEach(docSnap => {
                    const p = docSnap.data();
                    cont.innerHTML += `
                        <div class="p-2 bg-slate-50 rounded-xl mb-1 flex justify-between items-center border">
                            <div class="text-[10px] uppercase font-bold">${p.nombre} <span class="text-slate-400">($${p.venta})</span></div>
                            <button onclick="window.agregarAlCarrito('${docSnap.id}', '${p.nombre}', ${p.venta})" class="bg-slate-900 text-white px-3 py-1 rounded-lg">+</button>
                        </div>`;
                });
            });
        }

        window.agregarProductoBase = async () => {
            const nombre = prompt("Nombre:");
            const venta = parseFloat(prompt("Precio Venta:"));
            if(nombre) await addDoc(collection(db, "inventario"), { nombre, venta, stock: 100, ventasDia: 0, totalDia: 0 });
        };
    </script>
</head>
<body class="bg-slate-100 min-h-screen p-2 font-sans">

    <div id="modal-escaner" class="fixed inset-0 bg-black z-[100] hidden">
        <div id="reader" class="w-full h-full"></div>
        <button onclick="cerrarEscaner()" class="absolute bottom-10 left-1/2 -translate-x-1/2 bg-white px-8 py-4 rounded-2xl font-black">CERRAR</button>
    </div>

    <div id="panel-admin" class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-4 hidden">
        
        <div class="lg:col-span-4 space-y-4">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-2xl border-4 border-indigo-600 flex flex-col h-[600px]">
                <h2 class="text-center font-black uppercase text-xs tracking-widest mb-4">Cuenta del Alumno</h2>
                <div id="items-carrito" class="flex-1 overflow-y-auto mb-4 border-t border-b py-4"></div>
                <div class="text-center">
                    <p class="text-[10px] font-bold text-slate-400">TOTAL A PAGAR</p>
                    <p id="total-carrito" class="text-5xl font-black text-slate-900">$0.00</p>
                    <button id="btn-finalizar" onclick="finalizarVenta()" disabled class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black mt-4 shadow-xl disabled:bg-slate-300">FINALIZAR Y COBRAR</button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-8 space-y-4">
            <header class="flex justify-between items-center bg-white p-4 rounded-3xl shadow-sm">
                <h1 id="saludo" class="font-black uppercase text-sm"></h1>
                <div class="flex gap-2">
                    <button onclick="abrirEscaner()" class="bg-green-600 text-white px-4 py-2 rounded-xl font-bold text-xs">📸 ESCANEAR QR</button>
                    <button onclick="agregarProductoBase()" class="bg-slate-100 px-4 py-2 rounded-xl font-bold text-xs">+ NUEVO PROD</button>
                </div>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
                <div class="bg-white p-6 rounded-[2rem] shadow-sm h-[450px] flex flex-col border">
                    <h3 class="text-center font-black text-[10px] text-slate-400 uppercase mb-4 tracking-widest">Impresiones por Cobrar</h3>
                    <div id="lista-impresiones" class="flex-1 overflow-y-auto"></div>
                </div>

                <div class="bg-white p-6 rounded-[2rem] shadow-sm h-[450px] flex flex-col border">
                    <h3 class="text-center font-black text-[10px] text-slate-400 uppercase mb-4 tracking-widest">Papelería en Stock</h3>
                    <div id="lista-stock" class="flex-1 overflow-y-auto"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-registro" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-[100] hidden text-center">
        <div class="bg-white p-8 rounded-[2.5rem] w-full max-w-sm">
            <h2 class="text-2xl font-black mb-6">Identifícate 👋</h2>
            <input id="input-nombre" type="text" placeholder="NOMBRE" class="w-full border-4 p-4 rounded-2xl mb-4 text-center font-black uppercase">
            <button onclick="let n = document.getElementById('input-nombre').value; if(n){localStorage.setItem('nombre_usuario', n); location.reload();}" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black">ENTRAR</button>
        </div>
    </div>
</body>
</html>
