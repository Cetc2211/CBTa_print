<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestor de Impresiones - CBTA 130</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBbfj61fpxREe0YLXpSX8taSoV06GnLHtw",
            authDomain: "cbta-impresiones.firebaseapp.com",
            projectId: "cbta-impresiones",
            storageBucket: "cbta-impresiones.firebasestorage.app",
            messagingSenderId: "674671663079",
            appId: "1:674671663079:web:709e356d760c2c307f0f42"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        // Configuración de Redes Wi-Fi Direct (Edita los nombres y claves aquí)
        const redesImpresoras = {
            laser_bn: { red: "DIRECT-HP-LaserJet-M15", clave: "12345678" },
            smart_tank: { red: "DIRECT-HP-Smart-Tank-515", clave: "87654321" },
            laser_color: { red: "DIRECT-HP-Color-Laser-Pro", clave: "admin123" }
        };

        let coberturaDetectada = 0;
        let nombreUsuario = localStorage.getItem('nombre_usuario') || "";

        window.onload = () => {
            if (!nombreUsuario) {
                document.getElementById('modal-registro').classList.remove('hidden');
            } else {
                document.getElementById('saludo').innerText = `Hola, ${nombreUsuario}`;
            }
            escucharRegistros();
        };

        window.guardarPerfil = () => {
            const nombre = document.getElementById('input-nombre').value;
            if (nombre) {
                localStorage.setItem('nombre_usuario', nombre);
                nombreUsuario = nombre;
                document.getElementById('modal-registro').classList.add('hidden');
                document.getElementById('saludo').innerText = `Hola, ${nombreUsuario}`;
            }
        };

        window.analizarArchivo = async (event) => {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            document.getElementById('info-cobertura').innerText = "Analizando color...";
            reader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                const pdf = await pdfjsLib.getDocument(typedarray).promise;
                document.getElementById('pags-count').value = pdf.numPages;
                const page = await pdf.getPage(1);
                const viewport = page.getViewport({scale: 0.3});
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                await page.render({canvasContext: context, viewport: viewport}).promise;
                const imgData = context.getImageData(0, 0, canvas.width, canvas.height).data;
                let pixColor = 0;
                for (let i = 0; i < imgData.length; i += 4) {
                    if (Math.abs(imgData[i] - imgData[i+1]) > 15 || Math.abs(imgData[i] - imgData[i+2]) > 15) pixColor++;
                }
                coberturaDetectada = (pixColor / (imgData.length / 4)) * 100;
                window.actualizarPrecios();
            };
            reader.readAsArrayBuffer(file);
        };

        window.actualizarPrecios = () => {
            const pags = parseInt(document.getElementById('pags-count').value) || 0;
            const imp = document.getElementById('impresora').value;
            let pU = 0;
            if (imp === 'laser_bn') pU = 1.0;
            else if (imp === 'smart_tank') pU = coberturaDetectada > 15 ? 3.0 : 1.5;
            else if (imp === 'laser_color') pU = coberturaDetectada > 15 ? 7.0 : 2.5;
            document.getElementById('display-total').innerText = `$${(pags * pU).toFixed(2)}`;
            document.getElementById('info-cobertura').innerText = `Cobertura: ${coberturaDetectada.toFixed(1)}%`;
        };

        window.registrar = async () => {
            const totalStr = document.getElementById('display-total').innerText.replace('$', '');
            const impId = document.getElementById('impresora').value;
            try {
                await addDoc(collection(db, "impresiones"), {
                    usuario: nombreUsuario,
                    impresora: impId,
                    paginas: parseInt(document.getElementById('pags-count').value),
                    total: parseFloat(totalStr),
                    fecha: serverTimestamp()
                });
                // Mostrar datos de Wi-Fi al alumno
                const infoRed = redesImpresoras[impId];
                document.getElementById('wifi-nombre').innerText = infoRed.red;
                document.getElementById('wifi-clave').innerText = infoRed.clave;
                document.getElementById('modal-exito').classList.remove('hidden');
            } catch (e) { alert("Error de red"); }
        };

        function escucharRegistros() {
            const q = query(collection(db, "impresiones"), orderBy("fecha", "desc"), limit(10));
            onSnapshot(q, (snapshot) => {
                const lista = document.getElementById('historial');
                lista.innerHTML = "";
                snapshot.forEach((doc) => {
                    const d = doc.data();
                    lista.innerHTML += `<div class="p-3 border-b flex justify-between bg-white mb-2 rounded-lg shadow-sm">
                        <span><b>${d.usuario}</b> (${d.impresora})</span>
                        <span class="text-green-600 font-bold">$${d.total.toFixed(2)}</span>
                    </div>`;
                });
            });
        }
        window.cerrarExito = () => document.getElementById('modal-exito').classList.add('hidden');
    </script>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <div id="modal-registro" class="fixed inset-0 bg-slate-900/90 flex items-center justify-center p-4 z-50 hidden text-center">
        <div class="bg-white p-8 rounded-3xl w-full max-w-sm">
            <h2 class="text-2xl font-black mb-4">¡Bienvenido!</h2>
            <input id="input-nombre" type="text" placeholder="Tu nombre o Profr." class="w-full border-2 p-4 rounded-2xl mb-4 text-center font-bold outline-none focus:border-green-500">
            <button onclick="guardarPerfil()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold">Entrar</button>
        </div>
    </div>

    <div id="modal-exito" class="fixed inset-0 bg-green-600/95 flex items-center justify-center p-4 z-50 hidden text-center text-white">
        <div class="max-w-sm w-full">
            <div class="text-6xl mb-4">✅</div>
            <h2 class="text-3xl font-black mb-2">¡Registrado!</h2>
            <p class="mb-6 opacity-90">Ya puedes imprimir. Conéctate a esta red en tu celular:</p>
            <div class="bg-white text-slate-900 p-6 rounded-3xl shadow-2xl mb-6">
                <p class="text-[10px] font-bold uppercase text-slate-400 mb-1">Red Wi-Fi</p>
                <p id="wifi-nombre" class="text-xl font-black mb-4">Cargando...</p>
                <p class="text-[10px] font-bold uppercase text-slate-400 mb-1">Contraseña</p>
                <p id="wifi-clave" class="text-2xl font-black text-green-600 tracking-widest">Cargando...</p>
            </div>
            <button onclick="cerrarExito()" class="w-full bg-white/20 border-2 border-white py-4 rounded-2xl font-bold">Entendido</button>
        </div>
    </div>

    <div class="max-w-5xl mx-auto p-6 lg:p-10">
        <header class="flex justify-between items-center mb-8">
            <h1 id="saludo" class="text-2xl font-black">Cargando...</h1>
            <div class="text-xs font-bold bg-green-100 text-green-700 px-4 py-2 rounded-full">SISTEMA ACTIVO</div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="bg-white p-8 rounded-[2rem] shadow-xl border border-slate-100 space-y-6">
                <label class="block">
                    <span class="text-xs font-black uppercase text-slate-400 mb-2 block">1. Selecciona tu PDF</span>
                    <input type="file" accept=".pdf" onchange="analizarArchivo(event)" class="w-full text-sm file:mr-4 file:py-3 file:px-6 file:rounded-2xl file:border-0 file:bg-slate-900 file:text-white">
                </label>

                <div class="grid grid-cols-2 gap-4">
                    <input id="pags-count" type="number" value="1" oninput="actualizarPrecios()" class="bg-slate-50 border-2 rounded-2xl p-4 font-bold">
                    <select id="impresora" onchange="actualizarPrecios()" class="bg-slate-50 border-2 rounded-2xl p-4 font-bold">
                        <option value="laser_bn">Laser B/N</option>
                        <option value="smart_tank">Smart Tank</option>
                        <option value="laser_color">Laser Pro</option>
                    </select>
                </div>

                <div class="bg-slate-900 rounded-[2rem] p-8 text-center text-white">
                    <p id="info-cobertura" class="text-green-400 text-[10px] font-black uppercase mb-2 tracking-widest">Esperando...</p>
                    <div id="display-total" class="text-6xl font-black">$0.00</div>
                </div>

                <button onclick="registrar()" class="w-full bg-green-500 text-white font-black py-6 rounded-[1.5rem] text-xl shadow-lg">ENVIAR REGISTRO</button>
            </div>

            <div class="bg-slate-100/50 p-6 rounded-[2rem] border-2 border-dashed border-slate-200">
                <h2 class="font-black text-slate-400 uppercase text-xs mb-6 text-center">Monitor iPad Pro M5</h2>
                <div id="historial" class="space-y-3 h-[400px] overflow-y-auto pr-2"></div>
            </div>
        </div>
    </div>
</body>
</html>
