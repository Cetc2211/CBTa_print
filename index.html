<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistema de Impresiones - CBTA 130</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, query, orderBy, limit, deleteDoc, doc, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBbfj61fpxREe0YLXpSX8taSoV06GnLHtw",
            authDomain: "cbta-impresiones.firebaseapp.com",
            projectId: "cbta-impresiones",
            storageBucket: "cbta-impresiones.firebasestorage.app",
            messagingSenderId: "674671663079",
            appId: "1:674671663079:web:709e356d760c2c307f0f42"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        const redesImpresoras = {
            laser_bn: { red: "DIRECT-HP-LaserJet-M15", clave: "12345678" },
            smart_tank: { red: "DIRECT-HP-Smart-Tank-515", clave: "87654321" },
            laser_color: { red: "DIRECT-HP-Color-Laser-Pro", clave: "admin123" }
        };

        let coberturaDetectada = 0;
        let nombreUsuario = localStorage.getItem('nombre_usuario') || "";
        // DEFINIR SI ES ADMIN (Tú puedes cambiar "Cecilio" por tu nombre de login)
        const isAdmin = nombreUsuario.toLowerCase().includes("cecilio") || nombreUsuario.toLowerCase().includes("admin");

        window.onload = () => {
            if (!nombreUsuario) document.getElementById('modal-registro').classList.remove('hidden');
            else {
                document.getElementById('saludo').innerText = `Hola, ${nombreUsuario}`;
                // Solo mostrar panel de control si eres Admin
                if (isAdmin) {
                    document.getElementById('panel-admin').classList.remove('hidden');
                    document.getElementById('btn-flotante-qr').classList.remove('hidden');
                    escucharRegistros();
                }
            }
            generarQR();
        };

        // --- FUNCIONES ADMIN ---
        window.borrarRegistro = async (id) => { if(confirm("¿Borrar?")) await deleteDoc(doc(db, "impresiones", id)); };
        
        window.iniciarNuevaJornada = async () => {
            if(confirm("¿Reiniciar todo a $0?")) {
                const q = await getDocs(collection(db, "impresiones"));
                const batch = writeBatch(db);
                q.forEach((d) => batch.delete(d.ref));
                await batch.commit();
            }
        };

        function escucharRegistros() {
            const q = query(collection(db, "impresiones"), orderBy("fecha", "desc"), limit(30));
            onSnapshot(q, (snapshot) => {
                const lista = document.getElementById('historial');
                let total$ = 0, totalH = 0;
                lista.innerHTML = "";
                snapshot.forEach((doc) => {
                    const d = doc.data();
                    total$ += d.total; totalH += d.paginas;
                    const hora = d.fecha ? new Date(d.fecha.seconds * 1000).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : "";
                    lista.innerHTML += `
                        <div class="p-3 border-b flex justify-between items-center bg-white mb-2 rounded-xl shadow-sm">
                            <div class="text-xs"><b>${d.usuario}</b><br><span class="text-slate-400">${d.impresora} • ${hora}</span></div>
                            <div class="flex items-center gap-2">
                                <span class="font-black text-green-600">$${d.total.toFixed(2)}</span>
                                <button onclick="borrarRegistro('${doc.id}')" class="text-red-300 px-2">×</button>
                            </div>
                        </div>`;
                });
                document.getElementById('resumen-dinero').innerText = `$${total$.toFixed(2)}`;
                document.getElementById('resumen-hojas').innerText = totalH;
            });
        }

        // --- FUNCIONES GENERALES ---
        window.generarQR = () => { 
            new QRCode(document.getElementById("qrcode"), { text: window.location.href, width: 200, height: 200 }); 
        };
        
        window.guardarPerfil = () => {
            const n = document.getElementById('input-nombre').value;
            if(n) { localStorage.setItem('nombre_usuario', n); location.reload(); }
        };

        window.analizarArchivo = async (e) => {
            const file = e.target.files[0]; if(!file) return;
            const reader = new FileReader();
            document.getElementById('info-cobertura').innerText = "Calculando costo...";
            reader.onload = async function() {
                const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
                document.getElementById('pags-count').value = pdf.numPages;
                const page = await pdf.getPage(1);
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                const viewport = page.getViewport({scale: 0.2});
                canvas.height = viewport.height; canvas.width = viewport.width;
                await page.render({canvasContext: context, viewport: viewport}).promise;
                const data = context.getImageData(0,0,canvas.width,canvas.height).data;
                let color = 0;
                for(let i=0; i<data.length; i+=4) {
                    if(Math.abs(data[i]-data[i+1])>15 || Math.abs(data[i]-data[i+2])>15) color++;
                }
                coberturaDetectada = (color/(data.length/4))*100;
                actualizarPrecios();
            };
            reader.readAsArrayBuffer(file);
        };

        window.actualizarPrecios = () => {
            const pags = parseInt(document.getElementById('pags-count').value) || 0;
            const imp = document.getElementById('impresora').value;
            let pU = 1.0;
            if(imp==='smart_tank') pU = coberturaDetectada > 15 ? 3.0 : 1.5;
            if(imp==='laser_color') pU = coberturaDetectada > 15 ? 7.0 : 2.5;
            document.getElementById('display-total').innerText = `$${(pags * pU).toFixed(2)}`;
            document.getElementById('info-cobertura').innerText = `Análisis: ${coberturaDetectada.toFixed(1)}% de color`;
        };

        window.registrar = async () => {
            const total = parseFloat(document.getElementById('display-total').innerText.replace('$',''));
            const impId = document.getElementById('impresora').value;
            await addDoc(collection(db, "impresiones"), {
                usuario: nombreUsuario, impresora: impId, paginas: parseInt(document.getElementById('pags-count').value),
                total: total, fecha: serverTimestamp()
            });
            document.getElementById('wifi-nombre').innerText = redesImpresoras[impId].red;
            document.getElementById('wifi-clave').innerText = redesImpresoras[impId].clave;
            document.getElementById('modal-exito').classList.remove('hidden');
        };

        window.mostrarQR = () => document.getElementById('modal-qr').classList.remove('hidden');
        window.cerrarQR = () => document.getElementById('modal-qr').classList.add('hidden');
    </script>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-800">

    <button id="btn-flotante-qr" onclick="mostrarQR()" class="fixed bottom-6 right-6 bg-slate-900 text-white p-5 rounded-full shadow-2xl z-40 hidden hover:scale-105 transition-all">
        <span class="text-2xl">📲 QR</span>
    </button>

    <div id="modal-qr" class="fixed inset-0 bg-slate-900/95 flex items-center justify-center p-4 z-50 hidden" onclick="cerrarQR()">
        <div class="bg-white p-8 rounded-[2.5rem] w-full max-w-sm text-center" onclick="event.stopPropagation()">
            <h2 class="text-2xl font-black mb-4">Escanea para Cobro</h2>
            <div id="qrcode" class="flex justify-center mb-6"></div>
            <button onclick="cerrarQR()" class="w-full bg-slate-100 py-4 rounded-2xl font-bold">Cerrar</button>
        </div>
    </div>

    <div id="modal-registro" class="fixed inset-0 bg-slate-900 flex items-center justify-center p-4 z-50 hidden">
        <div class="bg-white p-8 rounded-3xl w-full max-w-sm text-center">
            <h2 class="text-2xl font-black mb-4">Bienvenido</h2>
            <input id="input-nombre" type="text" placeholder="Tu nombre" class="w-full border-2 p-4 rounded-2xl mb-4 text-center font-bold outline-none focus:border-green-500">
            <button onclick="guardarPerfil()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold">Entrar</button>
        </div>
    </div>

    <div id="modal-exito" class="fixed inset-0 bg-green-600 flex items-center justify-center p-4 z-50 hidden text-center text-white">
        <div class="max-w-sm w-full">
            <h2 class="text-4xl font-black mb-6">✅ ¡Listo!</h2>
            <div class="bg-white text-slate-900 p-8 rounded-[2.5rem] shadow-2xl mb-6">
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-2">Conéctate al Wi-Fi de la Impresora:</p>
                <p id="wifi-nombre" class="text-xl font-black mb-4"></p>
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-2">Contraseña:</p>
                <p id="wifi-clave" class="text-3xl font-black text-green-600 tracking-tighter"></p>
            </div>
            <button onclick="location.reload()" class="w-full border-2 border-white py-4 rounded-2xl font-bold">Nueva Impresión</button>
        </div>
    </div>

    <div class="max-w-6xl mx-auto p-4 lg:p-10">
        <header class="flex justify-between items-center mb-10">
            <h1 id="saludo" class="text-3xl font-black tracking-tighter">Cargando...</h1>
            <button onclick="localStorage.clear(); location.reload();" class="text-[10px] font-bold text-slate-400 border px-3 py-1 rounded-lg">Cerrar Sesión</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            <div class="lg:col-span-5 space-y-6">
                <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100 space-y-6">
                    <label class="block">
                        <span class="text-xs font-black uppercase text-slate-400 mb-2 block tracking-widest">1. Sube tu archivo</span>
                        <input type="file" accept=".pdf" onchange="analizarArchivo(event)" class="w-full text-xs file:mr-4 file:py-3 file:px-6 file:rounded-2xl file:border-0 file:bg-slate-900 file:text-white">
                    </label>

                    <div class="grid grid-cols-2 gap-4">
                        <input id="pags-count" type="number" value="1" oninput="actualizarPrecios()" class="bg-slate-50 border-2 rounded-2xl p-4 font-bold outline-none focus:border-green-500">
                        <select id="impresora" onchange="actualizarPrecios()" class="bg-slate-50 border-2 rounded-2xl p-4 font-bold outline-none focus:border-green-500">
                            <option value="laser_bn">Laser B/N</option>
                            <option value="smart_tank">Smart Tank</option>
                            <option value="laser_color">Laser Pro</option>
                        </select>
                    </div>

                    <div class="bg-slate-900 rounded-[2rem] p-8 text-center text-white shadow-2xl">
                        <p id="info-cobertura" class="text-green-400 text-[10px] font-black uppercase mb-2">Esperando archivo...</p>
                        <div id="display-total" class="text-6xl font-black">$0.00</div>
                    </div>

                    <button onclick="registrar()" class="w-full bg-green-500 text-white font-black py-6 rounded-[1.5rem] text-xl shadow-lg hover:bg-green-600 transition-all">ENVIAR REGISTRO</button>
                </div>
            </div>

            <div id="panel-admin" class="lg:col-span-7 space-y-6 hidden">
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 text-center">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Recaudación</p>
                        <p id="resumen-dinero" class="text-3xl font-black text-green-600">$0.00</p>
                    </div>
                    <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 text-center flex flex-col justify-center">
                        <button onclick="iniciarNuevaJornada()" class="text-[10px] font-bold text-red-500 uppercase">Reiniciar Corte</button>
                    </div>
                </div>

                <div class="bg-slate-100/50 p-6 rounded-[2.5rem] border-2 border-dashed border-slate-200">
                    <h2 class="font-black text-slate-400 uppercase text-[10px] mb-6 tracking-widest text-center">Monitor Docente (Total Hojas: <span id="resumen-hojas">0</span>)</h2>
                    <div id="historial" class="space-y-2 h-[400px] overflow-y-auto pr-2"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
